name: Build and Push

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "src/**"
      - "builder/**"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Clone rvllm
        run: git clone --depth 1 https://github.com/pyshx/rvllm.git ../rvllm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build context
        run: |
          mkdir -p /tmp/build_ctx/rvllm-runpod /tmp/build_ctx/rvllm
          cp -R ${{ github.workspace }}/. /tmp/build_ctx/rvllm-runpod/
          cp -R ${{ github.workspace }}/../rvllm/. /tmp/build_ctx/rvllm/

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: /tmp/build_ctx
          file: /tmp/build_ctx/rvllm-runpod/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/pyshx/rvllm-runpod:latest
            ghcr.io/pyshx/rvllm-runpod:${{ github.sha }}
          no-cache: true
